name: bnk_card_app
description: "BNK 부산은행 신용·체크카드를 조회·비교하고, AI 맞춤 추천과 온라인 신청·배송지 관리까지 한 곳에서 — 부산은행 카드 모바일 앱."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

# ─────────────────────────────────────────────
# 런타임 의존성
# ─────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── 네트워크 ──────────────────────────────
  dio: ^5.7.0                          # HTTP 클라이언트 (JWT 인터셉터 포함)
  file_picker: ^8.1.7                  # 서류 파일 선택
  url_launcher: ^6.3.1                 # 약관 PDF 외부 열기/다운로드
  # ── 상태관리 ──────────────────────────────
  flutter_riverpod: ^2.6.1             # 상태관리 코어
  riverpod_annotation: ^2.6.1          # @riverpod 어노테이션

  # ── 라우팅 ───────────────────────────────
  go_router: ^14.6.2                   # 선언적 라우팅 + 인증 가드

  # ── 보안 저장소 ───────────────────────────
  flutter_secure_storage: ^9.2.4       # JWT accessToken / refreshToken 보관

  # ── 로컬 저장소 ───────────────────────────
  shared_preferences: ^2.3.3           # 간단한 설정값 저장
  
  # -- 쿠키 이용
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  path_provider: ^2.1.4

  # ── 이미지 ───────────────────────────────
  cached_network_image: ^3.4.1         # 카드 이미지 캐싱 (OCI Object Storage URL)

  # ── HTML 렌더링 ───────────────────────────
  flutter_html: ^3.0.0                 # CARD_CONTENTS contentHtml / mobileContentHtml

  # ── 모델 직렬화 ───────────────────────────
  freezed_annotation: ^2.4.4           # 불변 모델 (copyWith, ==, toString)
  json_annotation: ^4.9.0              # fromJson / toJson 코드 생성

  # ── 유틸 ─────────────────────────────────
  intl: ^0.19.0                        # 날짜·금액 포맷 (연회비 ₩30,000 등)
  equatable: ^2.0.7                    # 값 동등성 비교 (Entity)
  device_info_plus: ^10.1.2            # 신뢰 기기 목록 표시용 기기명(모델) 조회

  # ── UI 보조 ───────────────────────────────
  carousel_slider: ^5.0.0              # 카드 이미지 FRONT/BACK/THUMBNAIL 슬라이드
  lottie: ^3.1.3                       # 로딩·빈화면 Lottie 애니메이션

  local_auth: ^2.3.0
  local_auth_android: ^1.0.56   # AndroidAuthMessages (생체 다이얼로그 한글 브랜딩)
  local_auth_darwin: ^1.6.1     # IOSAuthMessages
  crypto: ^3.0.6
  # 카카오톡 주소 API 사용
  webview_flutter: ^4.10.0

  # ── FCM 푸시 알림 ─────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

# ─────────────────────────────────────────────
# 개발·빌드 의존성
# ─────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0               # 린트 규칙

  # ── 코드 생성 ─────────────────────────────
  build_runner: ^2.4.13               # dart run build_runner build
  freezed: ^2.5.7                     # Freezed 코드 생성기
  json_serializable: ^6.8.0           # fromJson/toJson 코드 생성기
  riverpod_generator: ^2.6.2          # @riverpod Provider 코드 생성기

  # ── 테스트 ───────────────────────────────
  mockito: ^5.4.4                     # Mock 객체 생성 (UseCase 단위 테스트)
  mocktail: ^1.0.4                    # 타입 안전 Mock (Repository 테스트)

  # ── 앱 아이콘 생성 ────────────────────────
  image: ^4.3.0                       # tool/gen_icon.dart 에서 아이콘 PNG 렌더링
  flutter_launcher_icons: ^0.14.3     # 런처 아이콘 일괄 생성 (Android/iOS)


# ─────────────────────────────────────────────
# Flutter 설정
# ─────────────────────────────────────────────
# ─────────────────────────────────────────────
# 런처 아이콘 생성 설정 (dart run flutter_launcher_icons)
#   소스 PNG 는 tool/gen_icon.dart 로 생성: dart run tool/gen_icon.dart
# ─────────────────────────────────────────────
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false   # iOS Assets.xcassets/AppIcon.appiconset 미구성 → 비활성(추후 ios 셋업 후 true)
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#00677F"
  adaptive_icon_foreground: "assets/icons/app_icon_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/          # bnk_logo.png 등 정적 이미지
    - assets/icons/           # 커스텀 아이콘 SVG / PNG
    - assets/lottie/          # 로딩·빈화면 Lottie JSON

  # 필요 시 커스텀 폰트 추가
  # fonts:
  #   - family: Pretendard
  #     fonts:
  #       - asset: assets/fonts/Pretendard-Regular.otf
  #       - asset: assets/fonts/Pretendard-Bold.otf
  #         weight: 700